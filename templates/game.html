<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuadrados 3D - {{ codigo }}</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #0b0c10;
            color: #cdd6f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* Marcadores superiores */
        .game-header {
            position: absolute;
            top: 20px;
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .player-card {
            background-color: rgba(21, 23, 30, 0.85);
            border: 2px solid #1f2833;
            border-radius: 12px;
            padding: 12px 20px;
            text-align: center;
            width: 150px;
        }

        .player-card.azul {
            border-color: #45f3ff;
            box-shadow: 0 0 15px rgba(69, 243, 255, 0.2);
        }

        .player-card.rojo {
            border-color: #ff4565;
            box-shadow: 0 0 15px rgba(255, 69, 101, 0.2);
        }

        .player-name {
            font-size: 14px;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .score {
            font-size: 32px;
            font-weight: 900;
        }

        .azul .score { color: #45f3ff; }
        .rojo .score { color: #ff4565; }

        .room-info {
            text-align: center;
        }

        .room-code-val {
            font-family: monospace;
            font-size: 20px;
            font-weight: bold;
            color: #f9e2af;
            background: rgba(31, 40, 51, 0.6);
            padding: 4px 12px;
            border-radius: 6px;
            border: 1px dashed #f9e2af;
        }

        /* Estado del Turno */
        .status-box {
            position: absolute;
            top: 120px;
            background: rgba(21, 23, 30, 0.9);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            z-index: 10;
            border: 1px solid #1f2833;
        }

        /* PERSPECTIVA ISOMÉTRICA */
        .scene {
            perspective: 1000px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 60px;
        }

        /* Tablero rotado */
        .board-3d {
            transform: rotateX(50deg) rotateZ(-45deg);
            transform-style: preserve-3d;
            width: 320px;
            height: 320px;
            position: relative;
            background-color: rgba(15, 18, 26, 0.9);
            border-radius: 12px;
            box-shadow: 20px 20px 50px rgba(0,0,0,0.7);
        }

        /* PUNTOS (Nodos) */
        .point {
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: #ffffff;
            border-radius: 50%;
            transform: translate(-50%, -50%) translateZ(10px);
            box-shadow: 0 0 8px #ffffff;
            z-index: 5;
        }

        /* PALITOS / LÍNEAS INTERACTIVAS */
        .line {
            position: absolute;
            background-color: rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s;
            transform-style: preserve-3d;
            transform-origin: left center;
            z-index: 4;
        }

        /* Previsualización al pasar el mouse por encima */
        .line:not(.active):hover {
            background-color: rgba(255, 255, 255, 0.35);
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        }

        /* Palito ya colocado */
        .line.active.p1 {
            background-color: #45f3ff;
            box-shadow: 0 0 12px #45f3ff;
            transform: translateZ(6px);
        }

        .line.active.p2 {
            background-color: #ff4565;
            box-shadow: 0 0 12px #ff4565;
            transform: translateZ(6px);
        }

        /* CAPAS DE LOS CUADRADOS CONQUISTADOS */
        .square-fill {
            position: absolute;
            width: 68px;
            height: 68px;
            opacity: 0;
            transition: opacity 0.5s ease, transform 0.5s ease;
            transform: translateZ(2px);
            pointer-events: none;
        }

        .square-fill.p1 {
            background: radial-gradient(circle, rgba(69, 243, 255, 0.4) 0%, rgba(69, 243, 255, 0.05) 80%);
            opacity: 1;
            transform: translateZ(4px);
        }

        .square-fill.p2 {
            background: radial-gradient(circle, rgba(255, 69, 101, 0.4) 0%, rgba(255, 69, 101, 0.05) 80%);
            opacity: 1;
            transform: translateZ(4px);
        }

        .btn-exit {
            position: absolute;
            bottom: 25px;
            background-color: #15171e;
            color: #cdd6f4;
            border: 1px solid #1f2833;
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-exit:hover {
            background-color: #ff4565;
            color: #0b0c10;
        }
    </style>
</head>
<body>

<div class="game-header">
    <div class="player-card azul">
        <span class="player-name" id="p1-name">CREADOR (AZUL)</span>
        <div class="score" id="p1-score">0</div>
    </div>

    <div class="room-info">
        <div style="font-size: 10px; color: #8892b0; margin-bottom: 2px;">SALA</div>
        <span class="room-code-val">{{ codigo }}</span>
    </div>

    <div class="player-card rojo">
        <span class="player-name" id="p2-name">INVITADO (ROJO)</span>
        <div class="score" id="p2-score">0</div>
    </div>
</div>

<div class="status-box" id="status-message" style="color: #f9e2af;">
    ESPERANDO OPONENTE...
</div>

<div class="scene">
    <div class="board-3d" id="board">
        </div>
</div>

<a href="/" class="btn-exit">🚪 Abandonar Sala</a>

<script>
    const salaCodigo = "{{ codigo }}";
    const jugadorUsername = "{{ username }}";

    const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
    const socket = new WebSocket(`${protocol}://${window.location.host}/ws/${salaCodigo}/${jugadorUsername}`);

    const boardElement = document.getElementById("board");
    const statusMessage = document.getElementById("status-message");

    let miTurno = false;
    let jugadorId = null;

    // Grid de 5x5 puntos espaciados cada 80px (Tablero de 320x320)
    const espaciado = 80;

    function renderizarTablero() {
        boardElement.innerHTML = "";

        // 1. Dibujar los 25 Puntos (Nodos)
        for (let r = 0; r < 5; r++) {
            for (let c = 0; c < 5; c++) {
                const punto = document.createElement("div");
                punto.classList.add("point");
                punto.style.top = `${r * espaciado}px`;
                punto.style.left = `${c * espaciado}px`;
                boardElement.appendChild(punto);
            }
        }

        // 2. Crear las Líneas Horizontales interactivos (5 filas x 4 columnas)
        for (let r = 0; r < 5; r++) {
            for (let c = 0; c < 4; c++) {
                const linea = document.createElement("div");
                linea.classList.add("line");
                linea.id = `line-H-${r}-${c}`;
                
                // Posicionar y dimensionar
                linea.style.top = `${r * espaciado - 4}px`;
                linea.style.left = `${c * espaciado}px`;
                linea.style.width = `${espaciado}px`;
                linea.style.height = `8px`;
                
                linea.addEventListener("click", () => intentarColocarLinea("H", r, c));
                boardElement.appendChild(linea);
            }
        }

        // 3. Crear las Líneas Verticales interactivos (4 filas x 5 columnas)
        for (let r = 0; r < 4; r++) {
            for (let c = 0; c < 5; c++) {
                const linea = document.createElement("div");
                linea.classList.add("line");
                linea.id = `line-V-${r}-${c}`;
                
                // Posicionar y dimensionar
                linea.style.top = `${r * espaciado}px`;
                linea.style.left = `${c * espaciado - 4}px`;
                linea.style.width = `8px`;
                linea.style.height = `${espaciado}px`;
                
                linea.addEventListener("click", () => intentarColocarLinea("V", r, c));
                boardElement.appendChild(linea);
            }
        }

        // 4. Crear los Cuadrados conquistados (4x4) invisibles al inicio
        for (let r = 0; r < 4; r++) {
            for (let c = 0; c < 4; c++) {
                const sq = document.createElement("div");
                sq.classList.add("square-fill");
                sq.id = `sq-${r}-${c}`;
                
                // Centrado dentro de su cuadrante de 80x80
                sq.style.top = `${r * espaciado + 6}px`;
                sq.style.left = `${c * espaciado + 6}px`;
                boardElement.appendChild(sq);
            }
        }
    }

    function intentarColocarLinea(tipo, r, c) {
        if (!miTurno) {
            alert("No es tu turno de colocar una línea.");
            return;
        }
        
        socket.send(JSON.stringify({
            action: "colocar_linea",
            tipo: tipo,
            r: r,
            c: c,
            player: jugadorId
        }));
    }

    socket.onmessage = function(event) {
        const datos = JSON.parse(event.data);

        if (datos.type === "init") {
            jugadorId = datos.player_id;
            if (jugadorId === 1) {
                document.getElementById("p1-name").innerText = `🔵 ${jugadorUsername}`;
            }
        }

        if (datos.type === "update" || datos.type === "game_over") {
            miTurno = (datos.turn === jugadorId);

            // Actualizar Marcadores
            document.getElementById("p1-score").innerText = datos.puntos_p1;
            document.getElementById("p2-score").innerText = datos.puntos_p2;

            if (datos.player1_name) document.getElementById("p1-name").innerText = `🔵 ${datos.player1_name}`;
            if (datos.player2_name) {
                document.getElementById("p2-name").innerText = `🔴 ${datos.player2_name}`;
            } else {
                document.getElementById("p2-name").innerText = "ESPERANDO...";
            }

            // Pintar Líneas Horizontales colocadas
            for (let r = 0; r < 5; r++) {
                for (let c = 0; c < 4; c++) {
                    const status = datos.horizontales[r][c];
                    const el = document.getElementById(`line-H-${r}-${c}`);
                    if (status && el && !el.classList.contains("active")) {
                        el.classList.add("active");
                        // Aquí idealmente sabríamos quién la pintó, para efectos simples
                        // podemos usar el turno inverso o dejar que se actualice según el flujo
                        el.classList.add(datos.turn === 2 ? "p1" : "p2");
                    }
                }
            }

            // Pintar Líneas Verticales colocadas
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 5; c++) {
                    const status = datos.verticales[r][c];
                    const el = document.getElementById(`line-V-${r}-${c}`);
                    if (status && el && !el.classList.contains("active")) {
                        el.classList.add("active");
                        el.classList.add(datos.turn === 2 ? "p1" : "p2");
                    }
                }
            }

            // Pintar Cuadrados conquistados
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    const dueño = datos.cuadrados[r][c];
                    const el = document.getElementById(`sq-${r}-${c}`);
                    if (dueño !== 0 && el) {
                        el.className = "square-fill " + (dueño === 1 ? "p1" : "p2");
                    }
                }
            }

            // Mensajes de Turno / Fin
            if (datos.type === "game_over") {
                miTurno = false;
                if (datos.winner === jugadorId) {
                    statusMessage.innerText = "👑 ¡VICTORIA!";
                    statusMessage.style.color = "#45f3ff";
                } else if (datos.winner === 0) {
                    statusMessage.innerText = "🤝 EMPATE";
                    statusMessage.style.color = "#f9e2af";
                } else {
                    statusMessage.innerText = "💥 DERROTA";
                    statusMessage.style.color = "#ff4565";
                }
            } else {
                if (miTurno) {
                    statusMessage.innerText = "🟢 TU TURNO (Coloca un palito)";
                    statusMessage.style.color = "#45f3ff";
                } else {
                    statusMessage.innerText = "🔴 TURNO DEL RIVAL";
                    statusMessage.style.color = "#ff4565";
                }
            }
        }

        if (datos.type === "opponent_left") {
            miTurno = false;
            statusMessage.innerText = "⚠️ RIVAL SE DESCONECTÓ";
            statusMessage.style.color = "#ff4565";
            document.getElementById("p2-name").innerText = "DESCONECTADO";
        }
    };

    socket.onerror = () => {
        statusMessage.innerText = "❌ ERROR EN SERVIDOR";
        statusMessage.style.color = "#ff4565";
    };

    renderizarTablero();
</script>

</body>
</html>
