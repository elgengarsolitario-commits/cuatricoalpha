<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partida: {{ codigo }} - Cuatrico</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1a1b26;
            color: #cdd6f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* Marcadores y Código de Sala superior */
        .game-header {
            position: absolute;
            top: 20px;
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            z-index: 10;
        }

        .player-card {
            background-color: rgba(49, 50, 68, 0.75);
            border: 2px solid #45475a;
            border-radius: 12px;
            padding: 15px 25px;
            text-align: center;
            width: 140px;
            backdrop-filter: blur(5px);
        }

        .player-card.azul {
            border-color: #89b4fa;
            box-shadow: 0 0 15px rgba(137, 180, 250, 0.3);
        }

        .player-card.rojo {
            border-color: #f38ba8;
            box-shadow: 0 0 15px rgba(243, 139, 168, 0.3);
        }

        .player-name {
            font-size: 16px;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
        }

        .score {
            font-size: 32px;
            font-weight: 900;
        }

        .azul .score { color: #89b4fa; }
        .rojo .score { color: #f38ba8; }

        .middle-info {
            text-align: center;
        }

        .room-code-tag {
            font-size: 11px;
            letter-spacing: 2px;
            color: #a6adc8;
            display: block;
            margin-bottom: 5px;
        }

        .room-code-value {
            font-family: monospace;
            font-size: 24px;
            font-weight: bold;
            color: #f9e2af;
            background-color: rgba(49, 50, 68, 0.5);
            padding: 5px 15px;
            border-radius: 8px;
            border: 1px dashed #f9e2af;
        }

        /* Mensaje de Estado / Turno */
        .status-box {
            position: absolute;
            top: 130px;
            background: rgba(49, 50, 68, 0.9);
            padding: 10px 25px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 1.5px;
            color: #f9e2af;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-transform: uppercase;
            z-index: 10;
        }

        /* PERSPECTIVA Y ENTORNO DEL TABLERO */
        .scene {
            perspective: 800px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 80px;
        }

        /* El tablero en inclinación isométrica similar al tuyo */
        .board-3d {
            transform: rotateX(45deg) rotateZ(0deg);
            transform-style: preserve-3d;
            background-color: rgba(30, 30, 46, 0.85);
            border: 4px solid #313244;
            border-radius: 16px;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(7, 50px);
            grid-template-rows: repeat(6, 50px);
            gap: 15px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 0 20px rgba(0,0,0,0.5);
        }

        /* Celdas / Nodos interconectados */
        .cell {
            background-color: rgba(49, 50, 68, 0.6);
            border-radius: 50%;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Líneas conectoras simuladas por detrás (Efecto de red) */
        .cell::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 2px;
            background: rgba(69, 71, 90, 0.35);
            z-index: -1;
            transform: translateZ(-2px);
        }

        .cell::after {
            content: "";
            position: absolute;
            width: 2px;
            height: 200%;
            background: rgba(69, 71, 90, 0.35);
            z-index: -1;
            transform: translateZ(-2px);
        }

        .cell:hover {
            background-color: rgba(137, 180, 250, 0.25);
            box-shadow: 0 0 10px rgba(137, 180, 250, 0.5);
        }

        /* Animaciones para las fichas que caen */
        .cell.player-1 {
            background-color: #89b4fa; /* Color Azul */
            box-shadow: 0 0 15px #89b4fa, inset 0 0 10px rgba(0, 0, 0, 0.5);
            transform: translateZ(10px);
        }

        .cell.player-2 {
            background-color: #f38ba8; /* Color Rojo */
            box-shadow: 0 0 15px #f38ba8, inset 0 0 10px rgba(0, 0, 0, 0.5);
            transform: translateZ(10px);
        }

        /* Botón de salida */
        .btn-exit {
            position: absolute;
            bottom: 30px;
            background-color: #313244;
            color: #cdd6f4;
            border: 1px solid #45475a;
            padding: 10px 25px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }

        .btn-exit:hover {
            background-color: #f38ba8;
            color: #11111b;
        }
    </style>
</head>
<body>

<div class="game-header">
    <div class="player-card azul">
        <span class="player-name" id="p1-name">CREADOR (AZUL)</span>
        <div class="score" id="p1-score">0</div>
    </div>

    <div class="middle-info">
        <span class="room-code-tag">CÓDIGO DE LA PARTIDA</span>
        <span class="room-code-value" id="room-code">{{ codigo }}</span>
    </div>

    <div class="player-card rojo">
        <span class="player-name" id="p2-name">INVITADO (ROJO)</span>
        <div class="score" id="p2-score">0</div>
    </div>
</div>

<div class="status-box" id="status-message">
    ESPERANDO OPONENTE...
</div>

<div class="scene">
    <div class="board-3d" id="board">
        </div>
</div>

<a href="/" class="btn-exit">🚪 Abandonar Sala</a>

<script>
    const salaCodigo = "{{ codigo }}";
    const jugadorUsername = "{{ username }}";

    // Configuración del WebSocket dinámico (local o SSL seguro en Render)
    const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
    const socket = new WebSocket(`${protocol}://${window.location.host}/ws/${salaCodigo}/${jugadorUsername}`);

    const boardElement = document.getElementById("board");
    const statusMessage = document.getElementById("status-message");

    let miTurno = false;
    let jugadorId = null;
    let tablero = Array(6).fill(null).map(() => Array(7).fill(0));

    // Crear la cuadrícula isométrica en el DOM
    function inicializarTableroVisual() {
        boardElement.innerHTML = "";
        for (let fila = 0; fila < 6; fila++) {
            for (let col = 0; col < 7; col++) {
                const cell = document.createElement("div");
                cell.classList.add("cell");
                cell.dataset.fila = fila;
                cell.dataset.col = col;
                cell.addEventListener("click", () => enviarMovimiento(col));
                boardElement.appendChild(cell);
            }
        }
    }

    // Dibujar el estado actual del tablero en base a la matriz del backend
    function actualizarTableroVisual() {
        const celdas = document.querySelectorAll(".cell");
        celdas.forEach(cell => {
            const f = parseInt(cell.dataset.fila);
            const c = parseInt(cell.dataset.col);
            const valor = tablero[f][c];

            cell.className = "cell";
            if (valor === 1) {
                cell.classList.add("player-1");
            } else if (valor === 2) {
                cell.classList.add("player-2");
            }
        });
    }

    // Solicitar disparo de ficha en una columna al presionar un nodo
    function enviarMovimiento(columna) {
        if (!miTurno) {
            alert("¡Espera tu turno! No puedes mover ahora.");
            return;
        }
        
        socket.send(JSON.stringify({
            action: "move",
            col: columna,
            player: jugadorId
        }));
    }

    // Procesar eventos del servidor en tiempo real
    socket.onmessage = function(event) {
        const datos = JSON.parse(event.data);

        // Inicialización básica de la sesión
        if (datos.type === "init") {
            jugadorId = datos.player_id;
            if (jugadorId === 1) {
                document.getElementById("p1-name").innerText = `🔵 ${jugadorUsername}`;
            }
        }

        // Actualización de estado del tablero y nombres de jugadores
        if (datos.type === "update") {
            tablero = datos.board;
            miTurno = (datos.turn === jugadorId);
            actualizarTableroVisual();

            // Sincronizar nombres dinámicamente en los marcadores
            if (datos.player1_name) {
                document.getElementById("p1-name").innerText = `🔵 ${datos.player1_name}`;
            }
            if (datos.player2_name) {
                document.getElementById("p2-name").innerText = `🔴 ${datos.player2_name}`;
            } else {
                document.getElementById("p2-name").innerText = "ESPERANDO...";
            }

            // Cambiar textos del panel superior central
            if (miTurno) {
                statusMessage.innerText = "¡Tu turno!";
                statusMessage.style.color = "#a6e3a1";
            } else {
                statusMessage.innerText = "Turno del rival";
                statusMessage.style.color = "#f38ba8";
            }
        }

        // Caso: Fin de juego (Ganador / Empate)
        if (datos.type === "game_over") {
            tablero = datos.board;
            actualizarTableroVisual();
            miTurno = false;

            if (datos.winner === jugadorId) {
                statusMessage.innerText = "👑 ¡HAS GANADO!";
                statusMessage.style.color = "#a6e3a1";
                if (datos.winner === 1) {
                    document.getElementById("p1-score").innerText = "1";
                } else {
                    document.getElementById("p2-score").innerText = "1";
                }
            } else if (datos.winner === 0) {
                statusMessage.innerText = "🤝 EMPATE";
                statusMessage.style.color = "#f9e2af";
            } else {
                statusMessage.innerText = "💥 HAS PERDIDO";
                statusMessage.style.color = "#f38ba8";
                if (datos.winner === 1) {
                    document.getElementById("p1-score").innerText = "1";
                } else {
                    document.getElementById("p2-score").innerText = "1";
                }
            }
        }

        // Caso: Oponente desconectado
        if (datos.type === "opponent_left") {
            miTurno = false;
            statusMessage.innerText = "⚠️ OPONENTE DESCONECTADO";
            statusMessage.style.color = "#f9e2af";
            document.getElementById("p2-name").innerText = "DESCONECTADO";
        }
    };

    socket.onerror = function(err) {
        console.error("Error WebSocket:", err);
        statusMessage.innerText = "❌ ERROR DE CONEXIÓN";
        statusMessage.style.color = "#f38ba8";
    };

    socket.onclose = function() {
        statusMessage.innerText = "🔌 DESCONECTADO DEL SERVIDOR";
        statusMessage.style.color = "#7f849c";
    };

    // Lanzar construcción del tablero
    inicializarTableroVisual();
</script>

</body>
</html>
