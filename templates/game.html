<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partida: {{ codigo }} - Cuatrico</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1e1e2e;
            color: #cdd6f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        h1 {
            color: #89b4fa;
            margin: 5px 0;
        }
        .code-box {
            background-color: #313244;
            padding: 8px 16px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 18px;
            color: #f9e2af;
            border: 1px dashed #f9e2af;
            display: inline-block;
            margin-top: 5px;
        }
        .status-container {
            margin: 15px 0;
            font-size: 18px;
            font-weight: bold;
            color: #a6e3a1;
            text-align: center;
            min-height: 27px;
        }
        /* Tablero de Cuatrico (6 filas x 7 columnas) */
        .board-container {
            background-color: #2a2b3d;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            display: inline-block;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(7, 60px);
            grid-template-rows: repeat(6, 60px);
            gap: 10px;
            background-color: #1e1e2e;
            padding: 10px;
            border-radius: 8px;
        }
        .cell {
            background-color: #313244;
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cell:hover {
            transform: scale(1.05);
            background-color: #45475a;
        }
        /* Fichas de los jugadores */
        .cell.player-1 {
            background-color: #f38ba8; /* Ficha Roja */
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .cell.player-2 {
            background-color: #f9e2af; /* Ficha Amarilla */
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .btn-lobby {
            margin-top: 25px;
            background-color: #f38ba8;
            color: #11111b;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn-lobby:hover {
            background-color: #e06c75;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🎮 Cuatrico en Línea</h1>
    <p>Jugando como: <strong style="color: #a6e3a1;">{{ username }}</strong></p>
    <div>
        <span>Código de la Sala:</span>
        <div class="code-box" id="room-code">{{ codigo }}</div>
    </div>
</div>

<div class="status-container" id="status-message">
    ⌛ Esperando a que se una el oponente...
</div>

<div class="board-container">
    <div class="board" id="game-board">
        </div>
</div>

<a href="/" class="btn-lobby">🚪 Salir al Lobby</a>

<script>
    const salaCodigo = "{{ codigo }}";
    const jugadorUsername = "{{ username }}";
    
    // Configuración automática del protocolo de WebSocket según el entorno (WS o WSS)
    const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
    const socket = new WebSocket(`${protocol}://${window.location.host}/ws/${salaCodigo}/${jugadorUsername}`);

    const boardElement = document.getElementById("game-board");
    const statusMessage = document.getElementById("status-message");

    let miTurno = false;
    let jugadorId = null; // Se asignará en la primera conexión (1 o 2)
    let tablero = Array(6).fill(null).map(() => Array(7).fill(0)); // Tablero local de 6 filas x 7 columnas

    // Crear visualmente las celdas en el HTML
    function inicializarTableroVisual() {
        boardElement.innerHTML = "";
        for (let fila = 0; fila < 6; fila++) {
            for (let col = 0; col < 7; col++) {
                const cell = document.createElement("div");
                cell.classList.add("cell");
                cell.dataset.fila = fila;
                cell.dataset.col = col;
                // Al dar clic en cualquier celda, intentamos colocar una ficha en esa columna
                cell.addEventListener("click", () => realizarMovimiento(col));
                boardElement.appendChild(cell);
            }
        }
    }

    // Dibujar el estado actual del tablero
    function actualizarTableroVisual() {
        const celdas = document.querySelectorAll(".cell");
        celdas.forEach(cell => {
            const f = parseInt(cell.dataset.fila);
            const c = parseInt(cell.dataset.col);
            const valor = tablero[f][c];

            cell.className = "cell"; // Limpiar clases previas
            if (valor === 1) {
                cell.classList.add("player-1");
            } else if (valor === 2) {
                cell.classList.add("player-2");
            }
        });
    }

    // Enviar columna seleccionada al servidor
    function realizarMovimiento(columna) {
        if (!miTurno) {
            alert("¡No es tu turno! Espera el movimiento de tu rival.");
            return;
        }

        // Enviamos el movimiento en formato JSON al WebSocket
        const datos = {
            action: "move",
            col: columna,
            player: jugadorId
        };
        socket.send(JSON.stringify(datos));
    }

    // Escuchar respuestas del servidor en tiempo real
    socket.onmessage = function(event) {
        const datos = JSON.parse(event.data);

        // 1. Mensaje de bienvenida/inicialización
        if (datos.type === "init") {
            jugadorId = datos.player_id;
            statusMessage.innerText = "🔌 Conectado. Esperando oponente...";
        }

        // 2. Comienzo o actualización del juego
        if (datos.type === "update") {
            tablero = datos.board;
            miTurno = (datos.turn === jugadorId);
            actualizarTableroVisual();

            if (miTurno) {
                statusMessage.innerText = "🟢 ¡Es tu turno! Elige una columna.";
                statusMessage.style.color = "#a6e3a1";
            } else {
                statusMessage.innerText = "🔴 Esperando el turno de tu rival...";
                statusMessage.style.color = "#f38ba8";
            }
        }

        // 3. Cuando finaliza la partida
        if (datos.type === "game_over") {
            tablero = datos.board;
            actualizarTableroVisual();
            miTurno = false;

            if (datos.winner === jugadorId) {
                statusMessage.innerText = "🎉 ¡FELICIDADES! ¡HAS GANADO! 🏆";
                statusMessage.style.color = "#a6e3a1";
            } else if (datos.winner === 0) {
                statusMessage.innerText = "🤝 ¡Empate! Se llenó el tablero.";
                statusMessage.style.color = "#f9e2af";
            } else {
                statusMessage.innerText = "💥 Game Over. Tu oponente ha ganado.";
                statusMessage.style.color = "#f38ba8";
            }
        }

        // 4. Si el oponente se desconecta
        if (datos.type === "opponent_left") {
            miTurno = false;
            statusMessage.innerText = "⚠️ Tu oponente se ha desconectado.";
            statusMessage.style.color = "#f9e2af";
        }
    };

    socket.onerror = function(error) {
        console.error("Error en WebSocket: ", error);
        statusMessage.innerText = "❌ Error de conexión con el servidor.";
        statusMessage.style.color = "#f38ba8";
    };

    socket.onclose = function() {
        statusMessage.innerText = "🔌 Conexión cerrada.";
        statusMessage.style.color = "#7f849c";
    };

    // Lanzamos la creación visual al cargar el archivo
    inicializarTableroVisual();
</script>

</body>
</html>
