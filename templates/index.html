<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobby - Cuatrico</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1e1e2e;
            color: #cdd6f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .lobby-container {
            background-color: #313244;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 350px;
        }
        h1 {
            color: #89b4fa;
            margin-bottom: 25px;
        }
        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 6px;
            background-color: #45475a;
            color: #cdd6f4;
            font-size: 16px;
            text-align: center;
        }
        input:focus {
            outline: 2px solid #89b4fa;
        }
        button {
            width: 95%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-create {
            background-color: #a6e3a1;
            color: #11111b;
        }
        .btn-create:hover {
            background-color: #94e2d5;
        }
        .btn-join {
            background-color: #89b4fa;
            color: #11111b;
        }
        .btn-join:hover {
            background-color: #74c7ec;
        }
        .divider {
            margin: 15px 0;
            color: #7f849c;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="lobby-container">
    <h1>🎮 Cuatrico</h1>
    
    <input type="text" id="username" placeholder="Tu Nombre de Usuario" required>
    
    <hr style="border: 0.5px solid #45475a; margin: 20px 0;">

    <button class="btn-create" onclick="crearSala()">✨ Crear Nueva Partida</button>

    <div class="divider">ó unirse a una existente:</div>

    <input type="text" id="codigo-sala" placeholder="Código de la Sala (ej. AX39B)">
    <button class="btn-join" onclick="unirseSala()">🔌 Unirse a Partida</button>
</div>

<script>
    // Generar un código aleatorio para la sala
    function generarCodigo(longitud = 5) {
        const caracteres = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let resultado = '';
        for (let i = 0; i < longitud; i++) {
            resultado += caracteres.charAt(Math.floor(Math.random() * caracteres.length));
        }
        return resultado;
    }

    function obtenerUsername() {
        const username = document.getElementById('username').value.trim();
        if (!username) {
            alert("Por favor, ingresa un nombre de usuario primero.");
            return null;
        }
        return username;
    }

    function crearSala() {
        const username = obtenerUsername();
        if (!username) return;

        const codigoNuevo = generarCodigo();
        // Redirige al creador a la sala de espera con su código generado
        window.location.href = `/play/${codigoNuevo}/${username}`;
    }

    function unirseSala() {
        const username = obtenerUsername();
        if (!username) return;

        const codigoInput = document.getElementById('codigo-sala').value.trim().toUpperCase();
        if (!codigoInput) {
            alert("Por favor, introduce el código de la sala de tu rival.");
            return;
        }

        // Redirige al invitado a la sala usando el código ingresado
        window.location.href = `/play/${codigoInput}/${username}`;
    }
</script>

</body>
</html>
